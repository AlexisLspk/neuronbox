# On-disk model: Hugging Face-style folder, LoRA adapter, or single file.
name: local-weights-project
version: "1.0"

model:
  # Path relative to neuron.yaml directory, or absolute, or ~/models/...
  name: ./my-model-snapshot
  source: local

runtime:
  python: "3.11"
  cuda: "12.1"
  packages:
    - transformers==4.40.0
    - peft==0.10.0

gpu:
  min_vram: 8gb
  strategy: single

entrypoint: train.py

env:
  BATCH_SIZE: "2"
