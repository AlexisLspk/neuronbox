name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --release
      - run: cargo test --all
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      # Linux : vérifier que la feature NVML compile (pas de GPU requis sur le runner).
      - if: runner.os == 'Linux'
        run: cargo build -p neuronbox-runtime --features nvml && cargo clippy -p neuronbox-runtime --features nvml -- -D warnings
